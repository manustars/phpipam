{{- if and .Values.persistence.logo.enabled (not .Values.persistence.logo.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "phpipam.fullname" . }}-logo
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "phpipam.labels" . | nindent 4 }}
  {{- with .Values.persistence.logo.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.logo.accessMode | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.logo.size | quote }}
  {{- $sc := coalesce .Values.persistence.logo.storageClass .Values.global.storageClass }}
  {{- if $sc }}
  storageClassName: {{ $sc | quote }}
  {{- end }}
{{- end }}
---
