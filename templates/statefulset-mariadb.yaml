{{- if .Values.mariadb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "phpipam.fullname" . }}-mariadb
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "phpipam.mariadb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "phpipam.fullname" . }}-mariadb-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "phpipam.mariadb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "phpipam.mariadb.selectorLabels" . | nindent 8 }}
        {{- with .Values.mariadb.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.mariadb.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- $pullSecrets := concat (.Values.global.imagePullSecrets | default list) (.Values.imagePullSecrets | default list) }}
      {{- if $pullSecrets }}
      imagePullSecrets:
        {{- range $pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      serviceAccountName: {{ include "phpipam.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.mariadb.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: mariadb
          image: {{ include "phpipam.mariadb.image" . }}
          imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "phpipam.mariadb.secretName" . }}
                  key: {{ include "phpipam.mariadb.secretRootPasswordKey" . }}
            - name: MARIADB_DATABASE
              value: {{ .Values.database.name | quote }}
            - name: MARIADB_USER
              value: {{ .Values.database.user | quote }}
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "phpipam.secretName" . }}
                  key: {{ include "phpipam.secretPasswordKey" . }}
            {{- with .Values.mariadb.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.mariadb.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - "mysqladmin ping -h 127.0.0.1 -u root -p${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - "mysqladmin ping -h 127.0.0.1 -u root -p${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.mariadb.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mariadb.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            {{- if .Values.mariadb.mycnf }}
            - name: config
              mountPath: /etc/mysql/conf.d/custom.cnf
              subPath: custom.cnf
              readOnly: true
            {{- end }}
      {{- $needsVolumes := or .Values.mariadb.mycnf .Values.mariadb.persistence.existingClaim (not .Values.mariadb.persistence.enabled) }}
      {{- if $needsVolumes }}
      volumes:
        {{- if .Values.mariadb.mycnf }}
        - name: config
          configMap:
            name: {{ include "phpipam.fullname" . }}-mariadb-config
        {{- end }}
        {{- if .Values.mariadb.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.mariadb.persistence.existingClaim }}
        {{- else if not .Values.mariadb.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- end }}
      {{- with .Values.mariadb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mariadb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mariadb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.mariadb.persistence.enabled (not .Values.mariadb.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.mariadb.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.mariadb.persistence.accessMode | quote }}
        resources:
          requests:
            storage: {{ .Values.mariadb.persistence.size | quote }}
        {{- $sc := coalesce .Values.mariadb.persistence.storageClass .Values.global.storageClass }}
        {{- if $sc }}
        storageClassName: {{ $sc | quote }}
        {{- end }}
  {{- end }}
{{- end }}
