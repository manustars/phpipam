{{- if .Values.mariadb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "phpipam.fullname" . }}-mariadb
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "phpipam.mariadb.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "phpipam.mariadb.selectorLabels" . | nindent 6 }}
  ## Recreate avoids two instances writing to the same PVC simultaneously
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "phpipam.mariadb.selectorLabels" . | nindent 8 }}
        {{- with .Values.mariadb.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.mariadb.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- $pullSecrets := concat (.Values.global.imagePullSecrets | default list) (.Values.imagePullSecrets | default list) }}
      {{- if $pullSecrets }}
      imagePullSecrets:
        {{- range $pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      serviceAccountName: {{ include "phpipam.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.mariadb.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: mariadb
          image: {{ include "phpipam.mariadb.image" . }}
          imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "phpipam.mariadb.secretName" . }}
                  key: {{ include "phpipam.mariadb.secretRootPasswordKey" . }}
            - name: MARIADB_DATABASE
              value: {{ .Values.database.name | quote }}
            - name: MARIADB_USER
              value: {{ .Values.database.user | quote }}
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "phpipam.secretName" . }}
                  key: {{ include "phpipam.secretPasswordKey" . }}
            {{- with .Values.mariadb.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.mariadb.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - "mysqladmin ping -h 127.0.0.1 -u root -p${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - "mysqladmin ping -h 127.0.0.1 -u root -p${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.mariadb.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mariadb.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          {{- if .Values.mariadb.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "phpipam.mariadb.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.mariadb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mariadb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mariadb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
