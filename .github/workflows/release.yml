name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - Chart.yaml
      - values.yaml
      - templates/**
      - .helmignore
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint .

      - name: Package
        run: |
          mkdir dist
          helm package . --destination dist

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish to gh-pages
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          # Create gh-pages branch if it doesn't exist yet
          if ! git ls-remote --exit-code origin gh-pages; then
            git checkout --orphan gh-pages
            git rm -rf .
            echo "# phpIPAM Helm Repository" > README.md
            git add README.md
            git commit -m "chore: init gh-pages"
            git push origin gh-pages
            git checkout main
          fi

          # Mount gh-pages as a worktree
          git worktree add /tmp/gh-pages origin/gh-pages

          # Copy packaged chart into the worktree
          cp dist/*.tgz /tmp/gh-pages/

          # Rebuild index — merge so old versions are preserved
          if [ -f /tmp/gh-pages/index.yaml ]; then
            helm repo index /tmp/gh-pages/ --url "$PAGES_URL" --merge /tmp/gh-pages/index.yaml
          else
            helm repo index /tmp/gh-pages/ --url "$PAGES_URL"
          fi

          # Commit only if something actually changed
          cd /tmp/gh-pages
          git add .
          if git diff --staged --quiet; then
            echo "Version already published — nothing to do."
          else
            VERSION=$(grep '^version:' "$GITHUB_WORKSPACE/Chart.yaml" | awk '{print $2}')
            git commit -m "chore: publish chart v${VERSION}"
            git push origin gh-pages
          fi
