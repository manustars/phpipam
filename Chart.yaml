apiVersion: v2
name: phpipam
description: A Helm chart for phpIPAM - Open Source IP Address Management
type: application

# Chart version: bump this on every chart change following semver.
# MAJOR: breaking values/behaviour changes.
# MINOR: new features, backwards-compatible.
# PATCH: bug fixes, doc updates.
version: 0.1.2

# appVersion tracks the default phpIPAM image tag.
# Update when you want to ship a new phpIPAM release as the default.
# Users can always override with web.image.tag / cron.image.tag.
appVersion: "1.8"

home: https://phpipam.net
icon: https://phpipam.net/images/logo/phpipam-logo.png
sources:
  - https://github.com/phpipam-docker/phpipam-docker
  - https://github.com/phpipam/phpipam
keywords:
  - ipam
  - networking
  - ip-management
  - network-management
