apiVersion: v2
name: phpipam
description: A Helm chart for phpIPAM - Open Source IP Address Management
type: application
version: 0.1.0
appVersion: "1.8.0"
home: https://phpipam.net
icon: https://phpipam.net/images/logo/phpipam-logo.png
sources:
  - https://github.com/phpipam-docker/phpipam-docker
  - https://github.com/phpipam/phpipam
keywords:
  - ipam
  - networking
  - ip-management
  - network-management
annotations:
  artifacthub.io/category: networking
  artifacthub.io/license: GPL-3.0
dependencies:
  - name: mariadb
    version: "19.x.x"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: mariadb.enabled
